name: Build docker image

on:
  workflow_dispatch:

jobs:
  multi-registries:
    runs-on: ubuntu-22.04

    steps:
      - name: Get current date
        id: current_date_time
        uses: kaven-universe/github-action-current-date-time@v1
        with:
          format: "YYYYMMDDHHmmss"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get commit tag
        id: commit_tag
        run: |
          tag="$(git tag --points-at HEAD | head -n 1)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # =========================
      # Docker meta
      # =========================
      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: |
            kavenzero/${{ github.event.repository.name }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.commit_tag.outputs.tag }},enable=${{ steps.commit_tag.outputs.tag != '' }}
            type=raw,value=${{ steps.current_date_time.outputs.time }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # Build & Push
      # =========================
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
